<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — IJ's Wine Shop Admin</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0e0d;
        --card: #161412;
        --border: rgba(210, 200, 180, 0.1);
        --border-s: rgba(210, 200, 180, 0.2);
        --ink: #ede8df;
        --ink-light: #c8c2b4;
        --ink-muted: #6b6558;
        --gold: #c9a84c;
        --gold-dim: rgba(201, 168, 76, 0.1);
        --gold-hover: #dfc06a;
        --destructive: #e05c5c;
        --radius: 6px;
        --font-d: "Playfair Display", Georgia, serif;
        --font-ui: "Jost", system-ui, sans-serif;
      }

      body {
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      .login-wrap {
        width: 100%;
        max-width: 380px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .eyebrow {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .login-title {
        font-family: var(--font-d);
        font-size: 52px;
        font-weight: 700;
        font-style: italic;
        color: var(--ink);
        margin-top: 10px;
        line-height: 1;
      }

      .login-rule {
        width: 48px;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        margin: 18px auto;
      }

      .login-sub {
        font-size: 13px;
        font-weight: 300;
        color: var(--ink-muted);
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 18px;
      }

      label {
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink-muted);
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 11px 13px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-s);
        border-radius: var(--radius);
        color: var(--ink);
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 300;
        outline: none;
        transition:
          border-color 150ms ease,
          background 150ms ease;
      }

      input:focus {
        border-color: var(--gold);
        background: rgba(201, 168, 76, 0.04);
      }

      input::placeholder {
        color: var(--ink-muted);
        font-style: italic;
      }

      .btn-primary {
        width: 100%;
        padding: 13px 0;
        background: var(--gold);
        border: none;
        border-radius: var(--radius);
        color: #0f0e0d;
        font-family: var(--font-ui);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 250ms ease,
          transform 150ms ease;
        margin-top: 8px;
      }

      .btn-primary:hover {
        background: var(--gold-hover);
      }
      .btn-primary:active {
        transform: scale(0.99);
      }
      .btn-primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .error-msg {
        font-size: 12px;
        color: var(--destructive);
        margin-top: 12px;
        text-align: center;
        min-height: 18px;
      }

      /* toast */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 18px;
        border-radius: var(--radius);
        font-size: 13px;
        font-weight: 400;
        color: #fff;
        opacity: 0;
        transform: translateY(-8px);
        transition:
          opacity 250ms ease,
          transform 250ms ease;
        pointer-events: none;
        z-index: 9999;
        max-width: 320px;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.success {
        background: #2d6a4f;
      }
      .toast.error {
        background: #7d2a2a;
      }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-header">
        <p class="eyebrow">IJ's Wine Shop</p>
        <h1 class="login-title">Admin</h1>
        <div class="login-rule"></div>
        <p class="login-sub">Sign in to manage your collection.</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            autocomplete="email"
            required
            placeholder="you@example.com"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            autocomplete="current-password"
            required
            placeholder="••••••••"
          />
        </div>
        <p class="error-msg" id="error-msg"></p>
        <button type="submit" class="btn-primary" id="submit-btn">
          Sign In
        </button>
      </form>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ── Supabase ── -->
    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js';
      import { SUPABASE_CONFIG } from './config.js';

      const sb = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

      // Redirect if already logged in
      (async () => {
        const {
          data: { session },
        } = await sb.auth.getSession();
        if (session) window.location.href = "admin.html";
      })();

      // ── Toast helper ────────────────────────────────────────────────────────
      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => {
          t.className = "toast";
        }, 3000);
      }

      // ── Login ───────────────────────────────────────────────────────────────
      const form = document.getElementById("login-form");
      const errEl = document.getElementById("error-msg");
      const btn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errEl.textContent = "";
        btn.disabled = true;
        btn.textContent = "Signing in…";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { dataerr, error } = await sb.auth.signInWithPassword({
          email,
          password,
        });

        console.log(dataerr);
        console.log(error);

        if (error) {
          errEl.textContent = "Invalid email or password.";
          btn.disabled = false;
          btn.textContent = "Sign In";
          return;
        }

        const { data, error: dbError } = await sb
          .from("products")
          .select("*")
          .limit(1);

        console.log("Products:", data);
        console.log("Database Error:", dbError);

        showToast("Welcome back");

        setTimeout(() => {
          window.location.href = "admin.html";
        }, 600);
      });
    </script>
  </body>
</html>
